<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Architect — Enterprise Cross-Domain Planning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — Dark, refined, editorial
═══════════════════════════════════════════════ */
:root {
  --bg: #0c0d0f;
  --surface: #131518;
  --surface2: #1a1c20;
  --surface3: #222429;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e6e0;
  --text2: #8a8880;
  --text3: #5a5856;

  /* Domain palette */
  --eng: #4B9EFF;       --eng-dim: rgba(75,158,255,0.12);  --eng-mid: rgba(75,158,255,0.3);
  --prod: #3ECFA8;      --prod-dim: rgba(62,207,168,0.12); --prod-mid: rgba(62,207,168,0.3);
  --des: #F0A050;       --des-dim: rgba(240,160,80,0.12);  --des-mid: rgba(240,160,80,0.3);
  --mkt: #E0608A;       --mkt-dim: rgba(224,96,138,0.12);  --mkt-mid: rgba(224,96,138,0.3);

  --critical: #FF5B5B;
  --warning: #FFBA3B;
  --success: #3ECFA8;

  --radius: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  --font-display: 'DM Serif Display', serif;
  --font-body: 'Geist', sans-serif;
  --font-mono: 'DM Mono', monospace;

  --sidebar-w: 220px;
  --header-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════════ */
#app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-logo {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  font-family: var(--font-display);
  font-size: 17px;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.logo-sub {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 2px;
  font-family: var(--font-mono);
}

.sidebar-section {
  padding: 14px 12px 8px;
}
.sidebar-section-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  font-family: var(--font-mono);
  padding: 0 8px;
  margin-bottom: 4px;
}

.view-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 8px 10px;
  border: none;
  background: transparent;
  border-radius: var(--radius);
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 12.5px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.view-btn:hover { background: var(--surface2); color: var(--text); }
.view-btn.active { background: var(--surface3); color: var(--text); }
.view-btn .vb-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
}
.view-btn.active .vb-icon { background: var(--surface2); }
.view-btn .vb-label { font-weight: 400; }
.view-btn.active .vb-label { font-weight: 500; }

/* Domain filters */
.domain-filters { padding: 6px 12px 12px; }
.domain-filter-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.domain-filter-item:hover { background: var(--surface2); }
.domain-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.domain-filter-item.off .domain-dot { opacity: 0.2; }
.domain-filter-item.off .domain-filter-label { opacity: 0.35; }
.domain-filter-label { font-size: 12px; color: var(--text2); }

/* Alert panel in sidebar */
.alert-section {
  margin-top: auto;
  border-top: 1px solid var(--border);
  padding: 12px;
  overflow-y: auto;
  max-height: 200px;
}
.alert-header {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.alert-count {
  background: var(--critical);
  color: white;
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 10px;
  line-height: 1.4;
}
.alert-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 8px 10px;
  margin-bottom: 6px;
  border-left: 2px solid var(--critical);
  cursor: pointer;
  transition: background 0.12s;
}
.alert-card.warning { border-left-color: var(--warning); }
.alert-card:hover { background: var(--surface3); }
.alert-card-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}
.alert-card-msg { font-size: 10.5px; color: var(--text2); line-height: 1.4; }

/* MAIN CONTENT */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* TOPBAR */
#topbar {
  height: var(--header-h);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  background: var(--surface);
}
.topbar-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text);
  letter-spacing: -0.02em;
  flex: 1;
}
.topbar-title span {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text3);
  font-style: normal;
  margin-left: 10px;
  letter-spacing: 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}
.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-primary {
  background: var(--text);
  color: var(--bg);
}
.btn-primary:hover { opacity: 0.88; }

/* CANVAS */
#canvas {
  flex: 1;
  overflow: auto;
  position: relative;
}

/* ═══════════════════════════════════════════════
   EXECUTIVE VIEW
═══════════════════════════════════════════════ */
#view-executive {
  padding: 20px 24px;
  min-height: 100%;
}

.exec-timeline-header {
  display: grid;
  grid-template-columns: 140px repeat(4, 1fr);
  gap: 0;
  margin-bottom: 16px;
  padding-left: 0;
}
.exec-quarter-label {
  text-align: center;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text3);
  letter-spacing: 0.06em;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  border-left: 1px solid var(--border);
}
.exec-quarter-label:first-child { border-left: none; }

.exec-swimlane {
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: 140px 1fr;
  align-items: center;
  gap: 0;
}
.exec-domain-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  font-family: var(--font-mono);
  padding-right: 12px;
}
.exec-lane-track {
  position: relative;
  height: 52px;
  border-left: 1px solid var(--border);
}
.exec-quarter-divider {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--border);
}
.exec-bar {
  position: absolute;
  top: 10px; height: 32px;
  border-radius: 5px;
  display: flex; align-items: center;
  padding: 0 10px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: filter 0.2s, transform 0.2s;
  cursor: pointer;
}
.exec-bar:hover { filter: brightness(1.2); transform: translateY(-1px); }
.exec-milestone {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: transform 0.2s;
}
.exec-milestone:hover { transform: translate(-50%, -50%) scale(1.2); }

.exec-progress-bg {
  position: absolute;
  bottom: 0; left: 0;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  width: 100%;
}
.exec-progress-fill {
  position: absolute;
  bottom: 0; left: 0;
  height: 3px;
  border-radius: 2px;
}
.exec-status-dot {
  position: absolute;
  right: 8px; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px; border-radius: 50%;
}

/* Dep arrows SVG overlay */
#dep-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
}

/* ═══════════════════════════════════════════════
   GANTT VIEW
═══════════════════════════════════════════════ */
#view-gantt {
  padding: 0;
  min-width: 900px;
}
.gantt-header {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.gantt-label-col {
  width: 200px;
  flex-shrink: 0;
  padding: 10px 16px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-right: 1px solid var(--border);
}
.gantt-months-header {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
}
.gantt-month-cell {
  text-align: center;
  padding: 10px 0;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text3);
  border-right: 1px solid var(--border);
  letter-spacing: 0.04em;
}
.gantt-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.gantt-row:hover { background: rgba(255,255,255,0.015); }
.gantt-row-label {
  width: 200px;
  flex-shrink: 0;
  padding: 10px 16px;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.gantt-domain-pip {
  width: 3px;
  height: 20px;
  border-radius: 2px;
  flex-shrink: 0;
}
.gantt-row-name {
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gantt-row-track {
  flex: 1;
  position: relative;
  height: 42px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
}
.gantt-cell {
  border-right: 1px solid var(--border);
}
.gantt-bar-wrap {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.gantt-bar {
  position: absolute;
  top: 9px; height: 24px;
  border-radius: 4px;
  display: flex; align-items: center;
  padding: 0 8px;
  font-size: 10px;
  font-weight: 500;
  overflow: hidden;
  pointer-events: all;
  cursor: pointer;
  transition: filter 0.15s, transform 0.15s;
}
.gantt-bar:hover { filter: brightness(1.25); transform: translateY(-1px); }
.gantt-milestone-diamond {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  pointer-events: all;
  cursor: pointer;
}
.gantt-progress-stripe {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  opacity: 0.35;
  border-radius: 4px 0 0 4px;
}
.gantt-blocked-outline {
  position: absolute;
  top: 9px; height: 24px;
  border-radius: 4px;
  border: 1.5px dashed var(--critical);
  pointer-events: none;
}

/* SVG dep arrows in gantt */
#gantt-dep-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
  z-index: 5;
}

/* ═══════════════════════════════════════════════
   AGILE VIEW
═══════════════════════════════════════════════ */
#view-agile {
  padding: 20px 24px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  align-items: start;
}
.agile-column {
  background: var(--surface);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  overflow: hidden;
}
.agile-col-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.agile-col-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.agile-col-count {
  font-size: 10px;
  font-family: var(--font-mono);
  background: var(--surface2);
  color: var(--text3);
  padding: 2px 8px;
  border-radius: 10px;
}
.agile-cards {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.agile-card {
  background: var(--surface2);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
.agile-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.agile-card:hover { border-color: var(--border2); background: var(--surface3); transform: translateY(-1px); }
.agile-card-title {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}
.agile-card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.domain-badge {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  font-family: var(--font-mono);
}
.blocked-badge {
  font-size: 10px;
  background: rgba(255,91,91,0.15);
  color: var(--critical);
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.milestone-badge {
  font-size: 10px;
  background: rgba(255,255,255,0.06);
  color: var(--text2);
  padding: 2px 8px;
  border-radius: 10px;
}
.agile-progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 4px;
}
.agile-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.agile-progress-label {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-top: 4px;
}

/* ═══════════════════════════════════════════════
   MODAL — Add Item
═══════════════════════════════════════════════ */
#modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-xl);
  width: 480px;
  padding: 24px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-title {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--text);
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}
.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 11px;
  color: var(--text2);
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 5px;
}
.form-input, .form-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
}
.form-input:focus, .form-select:focus { border-color: rgba(255,255,255,0.25); }
.form-select option { background: var(--surface2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ═══════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════ */
#tooltip {
  position: fixed;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 11.5px;
  color: var(--text);
  pointer-events: none;
  z-index: 200;
  max-width: 220px;
  line-height: 1.5;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.tooltip-title { font-weight: 500; margin-bottom: 3px; }
.tooltip-row { color: var(--text2); display: flex; justify-content: space-between; gap: 12px; }
.tooltip-row span:last-child { color: var(--text); }

/* ═══════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }

/* Legend */
.legend { display: flex; gap: 16px; align-items: center; padding: 10px 0 0 140px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--text3); font-family: var(--font-mono); }
.legend-line { width: 20px; height: 1.5px; }
.legend-diamond { width: 8px; height: 8px; transform: rotate(45deg); }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">Roadmap<br>Architect</div>
      <div class="logo-sub">Enterprise · 2025</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Views</div>
      <button class="view-btn active" data-view="executive" onclick="switchView('executive')">
        <div class="vb-icon">⬛</div>
        <span class="vb-label">Executive</span>
      </button>
      <button class="view-btn" data-view="gantt" onclick="switchView('gantt')">
        <div class="vb-icon">▤</div>
        <span class="vb-label">Gantt / Ops</span>
      </button>
      <button class="view-btn" data-view="agile" onclick="switchView('agile')">
        <div class="vb-icon">⬜</div>
        <span class="vb-label">Agile Board</span>
      </button>
    </div>

    <div class="sidebar-section" style="padding-top:4px">
      <div class="sidebar-section-label">Domains</div>
    </div>
    <div class="domain-filters" id="domain-filters"></div>

    <div class="alert-section" id="alert-section">
      <div class="alert-header">
        Alerts <span class="alert-count" id="alert-count">0</span>
      </div>
      <div id="alert-list"></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="topbar">
      <div class="topbar-title" id="view-title">Executive Strategic View <span>North Star · 2025</span></div>
      <button class="btn btn-ghost" onclick="openModal()">+ Add Initiative</button>
      <button class="btn btn-ghost" onclick="toggleDeps()">⇢ Dependencies</button>
    </div>
    <div id="canvas">
      <div id="view-executive"></div>
      <div id="view-gantt" style="display:none"></div>
      <div id="view-agile" style="display:none; min-height:100%"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal">
    <div class="modal-title">New Initiative</div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="f-title" placeholder="e.g. Cloud Migration Phase 2" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Domain</label>
        <select class="form-select" id="f-domain">
          <option value="engineering">Engineering</option>
          <option value="product">Product</option>
          <option value="design">Design</option>
          <option value="marketing">Marketing</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-select" id="f-type">
          <option value="bar">Initiative</option>
          <option value="milestone">Milestone</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start Month (0–11)</label>
        <input class="form-input" id="f-start" type="number" min="0" max="11" value="0" />
      </div>
      <div class="form-group">
        <label class="form-label">End Month (0–11)</label>
        <input class="form-input" id="f-end" type="number" min="0" max="11" value="3" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Kanban Column</label>
      <select class="form-select" id="f-kanban">
        <option value="now">Now</option>
        <option value="next">Next</option>
        <option value="later">Later</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addItem()">Add Initiative</button>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script>
/* ════════════════════════════════════════════════
   DATA MODEL
════════════════════════════════════════════════ */
const DOMAIN_COLORS = {
  engineering: { main: '#4B9EFF', dim: 'rgba(75,158,255,0.14)', text: 'rgba(75,158,255,0.9)', badge: 'rgba(75,158,255,0.12)', badgeText: '#4B9EFF' },
  product:     { main: '#3ECFA8', dim: 'rgba(62,207,168,0.14)', text: 'rgba(62,207,168,0.9)', badge: 'rgba(62,207,168,0.12)', badgeText: '#3ECFA8' },
  design:      { main: '#F0A050', dim: 'rgba(240,160,80,0.14)', text: 'rgba(240,160,80,0.9)', badge: 'rgba(240,160,80,0.12)', badgeText: '#F0A050' },
  marketing:   { main: '#E0608A', dim: 'rgba(224,96,138,0.14)', text: 'rgba(224,96,138,0.9)', badge: 'rgba(224,96,138,0.12)', badgeText: '#E0608A' },
};
const DOMAIN_LABELS = { engineering: 'Engineering', product: 'Product', design: 'Design', marketing: 'Marketing' };
const DOMAINS = ['engineering', 'product', 'design', 'marketing'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QUARTERS = ['Q1','Q2','Q3','Q4'];
const STATUS_COLOR = { complete: '#3ECFA8', in_progress: '#4B9EFF', at_risk: '#FFBA3B', blocked: '#FF5B5B', not_started: '#5a5856' };

let items = [
  { id:'s1', title:'Cloud Migration', domain:'engineering', start:0, end:5, status:'in_progress', type:'bar', completion:0.45, kanban:'now', description:'Full AWS migration with zero-downtime cutover' },
  { id:'s2', title:'Identity Platform', domain:'engineering', start:3, end:8, status:'in_progress', type:'bar', completion:0.22, kanban:'next', description:'OAuth 2.0 + SSO implementation' },
  { id:'s3', title:'Feature Freeze', domain:'engineering', start:8, end:8, status:'not_started', type:'milestone', completion:0, kanban:'later', description:'Engineering feature freeze for GA' },
  { id:'p1', title:'Discovery Phase', domain:'product', start:0, end:2, status:'complete', type:'bar', completion:1, kanban:'now', description:'User research & competitive analysis' },
  { id:'p2', title:'Beta Launch Prep', domain:'product', start:2, end:5, status:'in_progress', type:'bar', completion:0.62, kanban:'next', description:'Coordinating beta cohort onboarding' },
  { id:'p3', title:'GA Release', domain:'product', start:9, end:9, status:'not_started', type:'milestone', completion:0, kanban:'later', description:'General Availability launch event' },
  { id:'d1', title:'UX Research', domain:'design', start:0, end:2, status:'complete', type:'bar', completion:1, kanban:'now', description:'Usability studies & persona definition' },
  { id:'d2', title:'Design System v2', domain:'design', start:3, end:7, status:'in_progress', type:'bar', completion:0.31, kanban:'next', description:'Component library overhaul with dark mode' },
  { id:'m1', title:'Demand Gen Campaign', domain:'marketing', start:5, end:8, status:'blocked', type:'bar', completion:0, kanban:'later', description:'Paid and organic demand generation' },
  { id:'m2', title:'Conference Launch', domain:'marketing', start:9, end:9, status:'not_started', type:'milestone', completion:0, kanban:'later', description:'Keynote announcement at TechSummit 2025' },
];

let deps = [
  { id:'dep1', sourceId:'s1', targetId:'m1', isCriticalPath:true, message:'"Demand Gen" blocked — Cloud Migration still in progress' },
  { id:'dep2', sourceId:'p2', targetId:'m1', isCriticalPath:false, message:'"Demand Gen" needs Beta Launch Prep to complete first' },
  { id:'dep3', sourceId:'d2', targetId:'p3', isCriticalPath:true, message:'"GA Release" gated on Design System v2 delivery' },
];

let visibleDomains = new Set(DOMAINS);
let activeView = 'executive';
let showDeps = true;

/* ════════════════════════════════════════════════
   DOMAIN FILTERS
════════════════════════════════════════════════ */
function renderDomainFilters() {
  const el = document.getElementById('domain-filters');
  el.innerHTML = DOMAINS.map(d => {
    const on = visibleDomains.has(d);
    return `<div class="domain-filter-item ${on?'':'off'}" onclick="toggleDomain('${d}')">
      <div class="domain-dot" style="background:${DOMAIN_COLORS[d].main}"></div>
      <span class="domain-filter-label">${DOMAIN_LABELS[d]}</span>
    </div>`;
  }).join('');
}

function toggleDomain(d) {
  if (visibleDomains.has(d)) visibleDomains.delete(d);
  else visibleDomains.add(d);
  renderDomainFilters();
  renderCurrentView();
}

/* ════════════════════════════════════════════════
   ALERTS
════════════════════════════════════════════════ */
function computeWarnings() {
  const itemMap = new Map(items.map(i => [i.id, i]));
  const blocked = new Set();
  deps.forEach(dep => {
    const src = itemMap.get(dep.sourceId);
    if (src && src.status !== 'complete') blocked.add(dep.targetId);
  });
  return deps.filter(d => blocked.has(d.targetId));
}

function renderAlerts() {
  const warnings = computeWarnings();
  document.getElementById('alert-count').textContent = warnings.length;
  document.getElementById('alert-list').innerHTML = warnings.length === 0
    ? '<div style="font-size:11px;color:var(--text3)">No active blockers</div>'
    : warnings.map(w => `<div class="alert-card ${w.isCriticalPath?'':'warning'}" title="${w.message}">
        <div class="alert-card-title">${w.isCriticalPath?'⚑ Critical':'⚠ Warning'}</div>
        <div class="alert-card-msg">${w.message}</div>
      </div>`).join('');
}

/* ════════════════════════════════════════════════
   VIEW SWITCHING
════════════════════════════════════════════════ */
const VIEW_TITLES = {
  executive: ['Executive Strategic View', 'North Star · 2025'],
  gantt: ['Cross-Domain Gantt', 'Ops View · Dependency Map'],
  agile: ['Agile Board', 'Now / Next / Later'],
};

function switchView(v) {
  activeView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  ['executive','gantt','agile'].forEach(id => {
    document.getElementById('view-'+id).style.display = id === v ? (v==='agile'?'grid':'block') : 'none';
  });
  const [title, sub] = VIEW_TITLES[v];
  document.getElementById('view-title').innerHTML = `${title} <span>${sub}</span>`;
  renderCurrentView();
}

function renderCurrentView() {
  if (activeView === 'executive') renderExecutive();
  else if (activeView === 'gantt') renderGantt();
  else renderAgile();
  renderAlerts();
}

function toggleDeps() {
  showDeps = !showDeps;
  renderCurrentView();
}

/* ════════════════════════════════════════════════
   TOOLTIP
════════════════════════════════════════════════ */
function showTooltip(e, item) {
  const t = document.getElementById('tooltip');
  const statusLabels = { complete:'Complete', in_progress:'In Progress', at_risk:'At Risk', blocked:'Blocked', not_started:'Not Started' };
  t.innerHTML = `
    <div class="tooltip-title">${item.title}</div>
    <div class="tooltip-row"><span>Domain</span><span>${DOMAIN_LABELS[item.domain]}</span></div>
    <div class="tooltip-row"><span>Status</span><span style="color:${STATUS_COLOR[item.status]}">${statusLabels[item.status]}</span></div>
    ${item.type==='bar' ? `<div class="tooltip-row"><span>Progress</span><span>${Math.round(item.completion*100)}%</span></div>` : ''}
    ${item.description ? `<div style="margin-top:6px;font-size:10.5px;color:var(--text3);line-height:1.4">${item.description}</div>` : ''}
  `;
  t.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = (e.clientX + 14) + 'px';
  t.style.top = (e.clientY - 10) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

document.addEventListener('mousemove', e => {
  const t = document.getElementById('tooltip');
  if (t.style.display === 'block') moveTooltip(e);
});

/* ════════════════════════════════════════════════
   EXECUTIVE VIEW
════════════════════════════════════════════════ */
function renderExecutive() {
  const el = document.getElementById('view-executive');
  const visItems = items.filter(i => visibleDomains.has(i.domain));
  const visDomainsArr = DOMAINS.filter(d => visibleDomains.has(d));

  let html = `<div style="padding:20px 24px">`;

  // Quarter header row
  html += `<div style="display:grid;grid-template-columns:140px repeat(4,1fr);margin-bottom:0">
    <div></div>
    ${QUARTERS.map(q => `<div style="text-align:center;font-size:10px;font-family:var(--font-mono);color:var(--text3);letter-spacing:.08em;padding:6px 0;border-bottom:1px solid var(--border);border-left:1px solid var(--border)">${q}</div>`).join('')}
  </div>`;

  // Swimlanes
  html += `<div style="position:relative">`;

  const LANE_H = 62;
  const totalH = visDomainsArr.length * LANE_H;
  const TRACK_LEFT = 140;

  visDomainsArr.forEach((dom, di) => {
    const dc = DOMAIN_COLORS[dom];
    const laneItems = visItems.filter(i => i.domain === dom);
    const y = di * LANE_H;

    html += `<div style="display:grid;grid-template-columns:140px 1fr;align-items:stretch;min-height:${LANE_H}px">
      <div style="display:flex;align-items:center;padding-right:14px;border-bottom:1px solid var(--border)">
        <span style="font-size:11px;font-weight:500;font-family:var(--font-mono);color:${dc.main};letter-spacing:.04em">${DOMAIN_LABELS[dom].toUpperCase()}</span>
      </div>
      <div style="position:relative;border-bottom:1px solid var(--border);border-left:1px solid var(--border);background:${dc.dim}">
        ${[1,2,3].map(qi => `<div style="position:absolute;left:${qi*25}%;top:0;bottom:0;width:1px;background:var(--border)"></div>`).join('')}
        ${laneItems.map(item => renderExecItem(item)).join('')}
      </div>
    </div>`;
  });

  html += `</div>`;

  // Legend
  html += `<div class="legend" style="padding:14px 0 0 140px">
    <div class="legend-item"><div style="width:24px;height:8px;border-radius:3px;background:var(--text3);margin-right:4px"></div>Initiative</div>
    <div class="legend-item"><div class="legend-diamond" style="background:var(--text3);width:8px;height:8px;margin-right:8px"></div>Milestone</div>
    ${showDeps ? `<div class="legend-item"><div class="legend-line" style="background:var(--critical);height:1.5px;margin-right:4px"></div>Critical dep.</div>
    <div class="legend-item"><div class="legend-line" style="background:var(--warning);height:1px;border-top:1px dashed var(--warning);margin-right:4px"></div>Dependency</div>` : ''}
  </div>`;
  html += `</div>`;

  el.innerHTML = html;

  // Draw dependency arrows via SVG overlay if needed
  if (showDeps) renderExecDeps();

  // Bind tooltip events
  el.querySelectorAll('[data-item-id]').forEach(node => {
    node.addEventListener('mouseenter', e => {
      const item = items.find(i => i.id === node.dataset.itemId);
      if (item) showTooltip(e, item);
    });
    node.addEventListener('mouseleave', hideTooltip);
  });
}

function barLeft(month) { return (month / 12) * 100; }
function barWidth(start, end) { return ((end - start) / 12) * 100; }

function renderExecItem(item) {
  const dc = DOMAIN_COLORS[item.domain];
  const left = barLeft(item.start) + '%';
  const pct = Math.round(item.completion * 100);

  if (item.type === 'milestone') {
    return `<div data-item-id="${item.id}" style="position:absolute;left:calc(${left} - 10px);top:50%;transform:translateY(-50%);width:20px;height:20px;cursor:pointer;z-index:3"
      title="${item.title}">
      <svg width="20" height="20" viewBox="0 0 20 20">
        <polygon points="10,2 18,10 10,18 2,10" fill="${dc.main}" opacity="0.9"/>
      </svg>
      <div style="position:absolute;top:22px;left:50%;transform:translateX(-50%);font-size:9px;font-family:var(--font-mono);color:${dc.main};white-space:nowrap;letter-spacing:.02em">${item.title}</div>
    </div>`;
  }

  const w = barWidth(item.start, item.end + 1);
  const statusDot = STATUS_COLOR[item.status];
  return `<div data-item-id="${item.id}" id="exec-${item.id}" style="position:absolute;left:${left};width:${w}%;top:12px;height:28px;background:${dc.dim};border:1px solid ${dc.main};border-radius:5px;cursor:pointer;z-index:2;overflow:hidden;transition:transform .15s,filter .15s"
    onmouseenter="this.style.filter='brightness(1.3)';this.style.transform='translateY(-1px)'"
    onmouseleave="this.style.filter='';this.style.transform=''">
    <div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:${dc.main};opacity:0.25;border-radius:4px 0 0 4px"></div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 8px;gap:5px">
      <span style="font-size:10px;font-weight:500;color:${dc.text};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">${item.title}</span>
      ${item.status === 'blocked' ? `<div style="width:6px;height:6px;border-radius:50%;background:var(--critical);flex-shrink:0"></div>` : ''}
    </div>
  </div>`;
}

function renderExecDeps() {
  // Dependency arrows drawn relative to bar positions
  // We'll use a mutation observer approach—just draw them after render
  requestAnimationFrame(() => {
    const canvas = document.getElementById('canvas');
    const existing = document.getElementById('exec-dep-svg');
    if (existing) existing.remove();

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.id = 'exec-dep-svg';
    svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:10';

    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    ['critical', 'warning'].forEach(type => {
      const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
      marker.setAttribute('id', 'arr-'+type);
      marker.setAttribute('viewBox', '0 0 10 10');
      marker.setAttribute('refX', '8');
      marker.setAttribute('refY', '5');
      marker.setAttribute('markerWidth', '5');
      marker.setAttribute('markerHeight', '5');
      marker.setAttribute('orient', 'auto-start-reverse');
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', 'M2 1L8 5L2 9');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', type === 'critical' ? '#FF5B5B' : '#FFBA3B');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('stroke-linecap', 'round');
      marker.appendChild(path);
      defs.appendChild(marker);
    });
    svg.appendChild(defs);

    const itemMap = new Map(items.map(i => [i.id, i]));
    const visArr = DOMAINS.filter(d => visibleDomains.has(d));

    deps.forEach(dep => {
      const src = itemMap.get(dep.sourceId);
      const tgt = itemMap.get(dep.targetId);
      if (!src || !tgt) return;
      if (!visibleDomains.has(src.domain) || !visibleDomains.has(tgt.domain)) return;

      const execEl = document.getElementById('view-executive');
      if (!execEl) return;
      const execRect = execEl.getBoundingClientRect();
      const canvasRect = canvas.getBoundingClientRect();

      // find src bar
      const srcEl = document.getElementById('exec-' + src.id);
      const tgtEl = document.getElementById('exec-' + tgt.id);
      if (!srcEl || !tgtEl) return;

      const srcR = srcEl.getBoundingClientRect();
      const tgtR = tgtEl.getBoundingClientRect();

      const ox = canvasRect.left - canvas.scrollLeft;
      const oy = canvasRect.top - canvas.scrollTop;

      const x1 = srcR.right - canvasRect.left + canvas.scrollLeft;
      const y1 = (srcR.top + srcR.bottom) / 2 - canvasRect.top + canvas.scrollTop;
      const x2 = tgtR.left - canvasRect.left + canvas.scrollLeft;
      const y2 = (tgtR.top + tgtR.bottom) / 2 - canvasRect.top + canvas.scrollTop;

      const color = dep.isCriticalPath ? '#FF5B5B' : '#FFBA3B';
      const mid = (x1 + x2) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} C${x1+30},${y1} ${x2-30},${y2} ${x2},${y2}`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', dep.isCriticalPath ? '1.5' : '1');
      path.setAttribute('stroke-dasharray', dep.isCriticalPath ? '' : '5 3');
      path.setAttribute('marker-end', `url(#arr-${dep.isCriticalPath?'critical':'warning'})`);
      path.setAttribute('opacity', '0.7');
      svg.appendChild(path);
    });

    canvas.style.position = 'relative';
    canvas.appendChild(svg);
  });
}

/* ════════════════════════════════════════════════
   GANTT VIEW
════════════════════════════════════════════════ */
function renderGantt() {
  const el = document.getElementById('view-gantt');
  const visItems = items.filter(i => visibleDomains.has(i.domain));
  const GANTT_W = 100; // percent per month slot
  const ROW_H = 42;

  let html = `<div style="position:relative">`;

  // Header
  html += `<div style="display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10">
    <div style="width:200px;flex-shrink:0;padding:10px 16px;font-size:10px;font-family:var(--font-mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;border-right:1px solid var(--border)">Initiative</div>
    <div style="flex:1;display:grid;grid-template-columns:repeat(12,1fr)">
      ${MONTHS.map((m,i) => `<div style="text-align:center;padding:10px 0;font-size:10px;font-family:var(--font-mono);color:var(--text3);border-right:1px solid var(--border);${i%3===0?'background:rgba(255,255,255,0.02)':''}">${m}</div>`).join('')}
    </div>
  </div>`;

  // Rows
  visItems.forEach((item, idx) => {
    const dc = DOMAIN_COLORS[item.domain];
    const pct = Math.round(item.completion * 100);
    const barL = (item.start / 12) * 100;
    const barW = item.type === 'milestone' ? 0 : ((item.end - item.start + 1) / 12) * 100;
    const milX = (item.start / 12) * 100;
    const odd = idx % 2 === 0;

    html += `<div data-item-id="${item.id}" id="grow-${item.id}" style="display:flex;border-bottom:1px solid var(--border);${odd?'background:rgba(255,255,255,0.01)':''}">
      <div style="width:200px;flex-shrink:0;padding:0 16px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;height:${ROW_H}px">
        <div style="width:3px;height:20px;border-radius:2px;background:${dc.main};flex-shrink:0"></div>
        <span style="font-size:11.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.title}</span>
      </div>
      <div style="flex:1;position:relative;height:${ROW_H}px;display:grid;grid-template-columns:repeat(12,1fr)">
        ${MONTHS.map((_,mi) => `<div style="border-right:1px solid var(--border);${mi%3===0?'background:rgba(255,255,255,0.01)':''}"></div>`).join('')}
        ${item.type === 'milestone'
          ? `<div style="position:absolute;left:calc(${milX}% - 10px);top:50%;transform:translateY(-50%);width:20px;height:20px;cursor:pointer;z-index:2">
              <svg width="20" height="20" viewBox="0 0 20 20"><polygon points="10,2 18,10 10,18 2,10" fill="${dc.main}"/></svg>
             </div>`
          : `<div style="position:absolute;left:${barL}%;width:${barW}%;top:8px;height:26px;border-radius:4px;background:${dc.dim};border:1px solid ${dc.main};overflow:hidden;cursor:pointer;z-index:2;transition:filter .15s,transform .15s"
              onmouseenter="this.style.filter='brightness(1.3)';this.style.transform='translateY(-1px)'"
              onmouseleave="this.style.filter='';this.style.transform=''">
              <div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:${dc.main};opacity:0.3;border-radius:3px 0 0 3px"></div>
              <div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 8px;gap:5px">
                <span style="font-size:10px;font-weight:500;color:${dc.text};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">${item.title}</span>
                <span style="font-size:9px;font-family:var(--font-mono);color:${dc.main};opacity:0.7;flex-shrink:0">${pct}%</span>
              </div>
              ${item.status === 'blocked' ? `<div style="position:absolute;inset:0;border:1.5px dashed var(--critical);border-radius:4px;pointer-events:none"></div>` : ''}
            </div>`
        }
      </div>
    </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;

  // Tooltip
  el.querySelectorAll('[data-item-id]').forEach(node => {
    node.addEventListener('mouseenter', e => {
      const item = items.find(i => i.id === node.dataset.itemId);
      if (item) showTooltip(e, item);
    });
    node.addEventListener('mouseleave', hideTooltip);
  });

  if (showDeps) renderGanttDeps(visItems, ROW_H);
}

function renderGanttDeps(visItems, ROW_H) {
  requestAnimationFrame(() => {
    const canvas = document.getElementById('canvas');
    const existing = document.getElementById('gantt-dep-svg');
    if (existing) existing.remove();

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.id = 'gantt-dep-svg';
    svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:8';

    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    ['critical','warning'].forEach(type => {
      const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
      marker.setAttribute('id', 'garr-'+type);
      marker.setAttribute('viewBox', '0 0 10 10');
      marker.setAttribute('refX', '8');
      marker.setAttribute('refY', '5');
      marker.setAttribute('markerWidth', '5');
      marker.setAttribute('markerHeight', '5');
      marker.setAttribute('orient', 'auto-start-reverse');
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('d', 'M2 1L8 5L2 9');
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke', type === 'critical' ? '#FF5B5B' : '#FFBA3B');
      p.setAttribute('stroke-width', '1.5');
      p.setAttribute('stroke-linecap', 'round');
      marker.appendChild(p);
      defs.appendChild(marker);
    });
    svg.appendChild(defs);

    const itemMap = new Map(items.map(i => [i.id, i]));
    const canvasRect = canvas.getBoundingClientRect();

    deps.forEach(dep => {
      const src = itemMap.get(dep.sourceId);
      const tgt = itemMap.get(dep.targetId);
      if (!src || !tgt) return;
      if (!visibleDomains.has(src.domain) || !visibleDomains.has(tgt.domain)) return;

      const srcEl = document.getElementById('grow-' + src.id);
      const tgtEl = document.getElementById('grow-' + tgt.id);
      if (!srcEl || !tgtEl) return;

      const srcR = srcEl.getBoundingClientRect();
      const tgtR = tgtEl.getBoundingClientRect();

      const x1 = srcR.right - canvasRect.left + canvas.scrollLeft;
      const y1 = (srcR.top + srcR.bottom) / 2 - canvasRect.top + canvas.scrollTop;
      const x2 = tgtR.left - canvasRect.left + canvas.scrollLeft;
      const y2 = (tgtR.top + tgtR.bottom) / 2 - canvasRect.top + canvas.scrollTop;

      const color = dep.isCriticalPath ? '#FF5B5B' : '#FFBA3B';
      const mx = (x1 + x2) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', dep.isCriticalPath ? '1.5' : '1');
      path.setAttribute('stroke-dasharray', dep.isCriticalPath ? '' : '5 3');
      path.setAttribute('marker-end', `url(#garr-${dep.isCriticalPath?'critical':'warning'})`);
      path.setAttribute('opacity', '0.65');
      svg.appendChild(path);
    });

    canvas.appendChild(svg);
  });
}

/* ════════════════════════════════════════════════
   AGILE VIEW
════════════════════════════════════════════════ */
function renderAgile() {
  const el = document.getElementById('view-agile');
  const visItems = items.filter(i => visibleDomains.has(i.domain));
  const cols = [
    { key: 'now',   label: 'Now',   color: '#3ECFA8' },
    { key: 'next',  label: 'Next',  color: '#4B9EFF' },
    { key: 'later', label: 'Later', color: '#F0A050' },
  ];

  el.innerHTML = cols.map(col => {
    const colItems = visItems.filter(i => i.kanban === col.key);
    return `<div class="agile-column">
      <div class="agile-col-header">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:6px;height:6px;border-radius:50%;background:${col.color}"></div>
          <span class="agile-col-title">${col.label}</span>
        </div>
        <span class="agile-col-count">${colItems.length}</span>
      </div>
      <div class="agile-cards">
        ${colItems.map(item => renderAgileCard(item)).join('')}
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('[data-item-id]').forEach(node => {
    node.addEventListener('mouseenter', e => {
      const item = items.find(i => i.id === node.dataset.itemId);
      if (item) showTooltip(e, item);
    });
    node.addEventListener('mouseleave', hideTooltip);
  });
}

function renderAgileCard(item) {
  const dc = DOMAIN_COLORS[item.domain];
  const pct = Math.round(item.completion * 100);
  const mStart = MONTHS[item.start];
  const mEnd = MONTHS[Math.min(item.end, 11)];
  return `<div class="agile-card" data-item-id="${item.id}" style="--card-color:${dc.main}">
    <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${dc.main};border-radius:12px 0 0 12px"></div>
    <div class="agile-card-title">${item.type === 'milestone' ? '◆ ' : ''}${item.title}</div>
    <div class="agile-card-meta">
      <span class="domain-badge" style="background:${dc.badge};color:${dc.badgeText}">${DOMAIN_LABELS[item.domain]}</span>
      ${item.status === 'blocked' ? `<span class="blocked-badge">Blocked</span>` : ''}
      ${item.status === 'complete' ? `<span style="font-size:10px;background:rgba(62,207,168,0.12);color:#3ECFA8;padding:2px 8px;border-radius:10px;font-weight:500">Complete</span>` : ''}
    </div>
    <div style="font-size:10.5px;color:var(--text3);font-family:var(--font-mono);margin-bottom:6px">${mStart}${item.type!=='milestone'&&item.end!==item.start?' – '+mEnd:''} 2025</div>
    ${item.type !== 'milestone' ? `
      <div class="agile-progress-bar">
        <div class="agile-progress-fill" style="width:${pct}%;background:${dc.main}"></div>
      </div>
      <div class="agile-progress-label">${pct}% complete</div>
    ` : ''}
  </div>`;
}

/* ════════════════════════════════════════════════
   MODAL
════════════════════════════════════════════════ */
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function addItem() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) return;
  const domain = document.getElementById('f-domain').value;
  const type = document.getElementById('f-type').value;
  const start = Math.max(0, Math.min(11, parseInt(document.getElementById('f-start').value) || 0));
  const end = Math.max(start, Math.min(11, parseInt(document.getElementById('f-end').value) || start));
  const kanban = document.getElementById('f-kanban').value;
  items.push({
    id: 'u' + Date.now(),
    title, domain, start, end, type, kanban,
    status: 'not_started', completion: 0,
    description: ''
  });
  closeModal();
  renderCurrentView();
}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
renderDomainFilters();
renderCurrentView();
</script>
